<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수미가 설계부</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.31.0/iconfont/tabler-icons.min.css">
<style>
:root{--bg:#f7f6f3;--surface:#fff;--surface2:#f0ede8;--border:#e2ddd6;--border2:#ccc8c0;--text:#1a1814;--text2:#6b6560;--text3:#9e9892;--accent:#2d5a3d;--accent-light:#e8f2eb;--red:#c0392b;--red-light:#fdf0ef;--blue:#2c5282;--blue-light:#ebf0f8;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);--shadow-md:0 4px 16px rgba(0,0,0,.10)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh}
body.locked{overflow:hidden}
body.locked .app-header,body.locked .main,body.locked .ev-popup,body.locked .modal-bg:not(#access-gate){display:none!important}
.access-gate{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(180deg,#f7faf8 0,#eef3f0 100%)}
body.unlocked .access-gate{display:none}
.access-card{width:min(420px,100%);background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-md);padding:28px}
.access-logo{width:42px;height:42px;border-radius:10px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:18px}
.access-title{font-size:24px;font-weight:800;line-height:1.25;margin-bottom:6px;color:var(--text)}
.access-sub{font-size:14px;color:var(--text2);margin-bottom:20px}
.access-input{width:100%;height:44px;border:1px solid var(--border);border-radius:8px;padding:0 13px;font-size:15px;font-family:inherit;outline:none;margin-bottom:10px}
.access-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,111,75,.12)}
.access-btn{width:100%;height:42px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer}
.access-btn:hover{background:#1f5f41}
.access-error{min-height:18px;margin-top:10px;font-size:12px;color:var(--red);font-weight:700}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:12px;height:56px;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:16px;font-weight:800}
.logo-sub{font-size:12px;color:var(--text3)}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--text3);font-weight:500}
.auth-btn{display:inline-flex;align-items:center;justify-content:center;min-height:28px;padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sync-dot.syncing{background:#e67e22;animation:pulse 1s infinite}
.sync-dot.ok{background:#27ae60}
.sync-dot.err{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tabs-nav{display:flex;gap:2px;margin-left:auto}
.tab-btn{padding:7px 16px;border:none;background:transparent;color:var(--text2);font-size:14px;cursor:pointer;border-radius:6px;font-family:inherit;display:flex;align-items:center;gap:5px;font-weight:600;transition:all .15s}
.tab-btn:hover{background:var(--surface2)}
.tab-btn.active{background:var(--accent);color:#fff}
.main{padding:20px 16px;max-width:1400px;margin:0 auto}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;box-shadow:var(--shadow)}
.stat-label{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-val{font-size:34px;font-weight:800;letter-spacing:-1.5px}
.panel{display:none}.panel.active{display:block}
body.chat-mode .stats-row{display:none}
.site-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.site-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;cursor:pointer;transition:all .2s;position:relative;box-shadow:var(--shadow)}
.site-card:hover{border-color:var(--border2);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.site-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.site-name{font-size:15px;font-weight:700;line-height:1.4;flex:1}
.site-meta{font-size:12px;color:var(--text3);margin-top:4px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.site-company{font-size:11px;color:var(--accent);background:var(--accent-light);padding:2px 7px;border-radius:4px;display:inline-block;margin-top:5px;font-weight:600}
.progress-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:2px;transition:width .5s}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:4px}
.site-progress{margin-top:10px}
.fill-green{background:#27ae60}.fill-blue{background:#2980b9}.fill-amber{background:#e67e22}.fill-purple{background:#8e44ad}
.card-del{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:12px;display:none;align-items:center;justify-content:center}
.site-card:hover .card-del{display:flex}
.card-del:hover{background:var(--red-light);color:var(--red)}
.site-add-card{background:transparent;border:1.5px dashed var(--border2);border-radius:var(--radius);padding:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:130px;color:var(--text3);font-size:13px}
.site-add-card:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.b-인테리어{background:#fef3c7;color:#92400e}.b-착공{background:#d1fae5;color:#065f46}
.b-골조{background:#dbeafe;color:#1e40af}.b-인허가{background:#fce7f3;color:#831843}.b-설계{background:#ede9fe;color:#4c1d95}
.av{display:inline-flex;width:20px;height:20px;border-radius:50%;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;border:1.5px solid rgba(0,0,0,.08)}
.av-이{background:#fef3c7;color:#92400e}.av-정{background:#ede9fe;color:#4c1d95}.av-선{background:#d1fae5;color:#065f46}
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:inherit;font-weight:500}
.filter-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.add-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.task-table{width:100%;border-collapse:collapse;font-size:14px}
.task-table th{font-size:12px;font-weight:700;color:var(--text3);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--surface2);text-transform:uppercase;letter-spacing:.3px}
.task-table td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.task-table tr:last-child td{border-bottom:none}
.task-table tr:hover td{background:var(--surface2)}
.muted{font-size:12px;color:var(--text3)}
.date-group{margin-bottom:20px}
.date-group-header{font-size:12px;font-weight:700;color:var(--text2);padding:6px 0;margin-bottom:4px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.5px}
.s-완료{display:inline-block;font-size:12px;padding:2px 8px;border-radius:10px;background:#d1fae5;color:#065f46;font-weight:600}
.s-진행중{display:inline-block;font-size:12px;padding:2px 8px;border-radius:10px;background:#dbeafe;color:#1e40af;font-weight:600}
.s-예정{display:inline-block;font-size:12px;padding:2px 8px;border-radius:10px;background:#fef3c7;color:#92400e;font-weight:600}
.action-btn{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:13px}
.action-btn:hover{background:var(--surface2);color:var(--text)}
.del-btn:hover{color:var(--red);background:var(--red-light)}
.action-btn.del-btn{color:#e74c3c;border:none;background:transparent;font-size:14px;font-weight:700}
.tl-container{overflow-x:auto}
.tl-label-col{width:220px;min-width:220px;flex-shrink:0}
.tl-months-row{flex:1;display:flex;min-width:800px}
.tl-month{flex:1;font-size:11px;color:var(--text3);text-align:center;padding:4px 0;border-left:1px solid var(--border);font-weight:700}
.tl-row{display:flex;align-items:center;margin-bottom:8px}
.tl-site-name{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.tl-track{flex:1;height:30px;position:relative;background:var(--surface2);border-radius:4px;min-width:800px;border:1px solid var(--border);overflow:visible}
.tl-bar{height:100%;border-radius:4px;position:absolute;display:flex;align-items:center;padding:0 10px;font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;cursor:pointer;border:1px solid rgba(0,0,0,.08)}
.tl-bar:hover{filter:brightness(.92)}
.tl-today-line{position:absolute;top:-4px;width:2px;background:var(--red);height:calc(100% + 8px);z-index:3;border-radius:1px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-title{font-size:20px;font-weight:800;letter-spacing:-.5px}
.cal-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);font-size:20px;font-weight:700;line-height:1}
.cal-btn:hover{border-color:var(--accent);color:var(--accent)}
.cal-today-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;color:var(--text2);font-family:inherit;font-weight:500}
.cal-grid-table{width:100%;border-collapse:collapse;table-layout:fixed}
.cal-dow{font-size:12px;font-weight:700;color:var(--text3);text-align:center;padding:8px 4px;border-bottom:1px solid var(--border);text-transform:uppercase}
.cal-dow.sun{color:#c0392b}.cal-dow.sat{color:#2c5282}
.cal-cell{vertical-align:top;border:1px solid var(--border);padding:6px;height:110px;background:var(--surface);cursor:pointer}
.cal-cell.other-month{background:var(--bg)}
.cal-cell.today-cell{background:#f0fdf4;border-color:#27ae60}
.cal-cell:hover{background:var(--surface2)}
.cal-date-num{font-size:13px;font-weight:700;color:var(--text3);margin-bottom:4px;text-align:right}
.cal-date-num.sun-c{color:#c0392b}.cal-date-num.sat-c{color:#2c5282}
.cal-date-today{width:22px;height:22px;border-radius:50%;background:#27ae60;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;float:right}
.cal-ev{font-size:11px;padding:2px 5px;border-radius:3px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4;font-weight:600;margin-bottom:2px}
.ev-상량식{background:#fef3c7;color:#92400e}.ev-미팅{background:#d1fae5;color:#065f46}
.ev-기타{background:#e5e7eb;color:#374151}.ev-연차{background:#fce7f3;color:#831843}.ev-default{background:#dbeafe;color:#1e40af}
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.35);z-index:200;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:14px;border:1px solid var(--border);width:100%;max-width:720px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-md);animation:slideUp .2s ease}
.modal-sm{max-width:560px}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{padding:20px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2;display:flex;align-items:flex-start;gap:12px}
.modal-header-text{flex:1}
.modal-title{font-size:19px;font-weight:800;line-height:1.3;letter-spacing:-.3px}
.modal-sub{font-size:12px;color:var(--text3);margin-top:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.close-btn{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border2);background:var(--surface);cursor:pointer;color:var(--text2);flex-shrink:0;font-size:13px;font-weight:600;font-family:inherit}
.close-btn:hover{background:var(--red-light);color:var(--red);border-color:var(--red)}
.modal-body{padding:20px}
.sec-title{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.3px}
.sec-title i{font-size:15px;color:var(--text3)}
.divider{height:1px;background:var(--border);margin:20px 0}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.info-item{background:var(--surface2);border-radius:8px;padding:12px 14px;border:1px solid var(--border)}
.info-label{font-size:11px;color:var(--text3);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.info-val{font-size:15px;font-weight:700}
.pay-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px}
.pay-table th{font-size:11px;font-weight:700;color:var(--text3);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);background:var(--surface2);text-transform:uppercase}
.pay-table td{padding:9px 8px;border-bottom:1px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pay-table tr:last-child td{border-bottom:none}
.pay-table tr.clickable:hover td{background:var(--surface2);cursor:pointer}
.pay-total-row td{background:var(--accent-light);font-weight:700;color:var(--accent)}
.timing-block{margin-bottom:8px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.timing-header{padding:10px 14px;background:var(--surface2);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.timing-body{display:none;padding:4px 0}.timing-body.open{display:block}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-item input[type=checkbox]{margin-top:2px;cursor:pointer;width:14px;height:14px;flex-shrink:0;accent-color:var(--accent)}
.check-label{font-size:13px;cursor:pointer;line-height:1.5;font-weight:500}
.check-label.done{color:var(--text3);text-decoration:line-through}
.check-reason{font-size:12px;color:var(--text3);margin-top:2px;line-height:1.4}
.memo-area{width:100%;min-height:90px;border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:15px;background:var(--surface);resize:vertical;line-height:1.6;font-family:inherit}
.memo-area:focus{outline:none;border-color:var(--accent)}
.memo-save{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;margin-top:8px;font-family:inherit;font-weight:600}
.memo-save:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.memo-saved{font-size:12px;color:var(--accent);margin-left:8px;opacity:0;transition:opacity .3s;font-weight:600}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.4px}
.form-input{width:100%;padding:10px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(45,90,61,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-primary{padding:10px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:14px;cursor:pointer;font-family:inherit;font-weight:700;display:inline-flex;align-items:center;gap:5px}
.btn-primary:hover{background:#244d33}
.btn-secondary{padding:10px 20px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;cursor:pointer;font-family:inherit;font-weight:600}
.btn-secondary:hover{background:var(--surface2)}
.section-sep{font-size:11px;font-weight:700;color:var(--text3);margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.8px;display:flex;align-items:center;gap:8px}
.upload-area{border:1.5px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;margin-bottom:8px;background:var(--bg)}
.upload-area:hover,.upload-area.drag-over{border-color:var(--accent);background:var(--accent-light)}
.upload-area-icon{font-size:26px;color:var(--text3);margin-bottom:6px}
.upload-area-text{font-size:14px;color:var(--text2);font-weight:600}
.upload-area-sub{font-size:12px;color:var(--text3);margin-top:3px}
.upload-status{font-size:13px;padding:8px 12px;border-radius:8px;margin-top:6px;font-weight:500}
.upload-status.loading{background:var(--blue-light);color:var(--blue)}
.upload-status.success{background:#d1fae5;color:#065f46}
.upload-status.error{background:var(--red-light);color:var(--red)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--surface);padding:12px 22px;border-radius:20px;font-size:14px;opacity:0;transition:all .3s;z-index:400;pointer-events:none;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.ev-popup{display:none;position:fixed;z-index:300;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;min-width:220px;max-width:280px;box-shadow:var(--shadow-md)}
.ev-popup.open{display:block}
.ev-popup-title{font-size:14px;font-weight:700;margin-bottom:8px;padding-right:20px}
.ev-popup-row{font-size:13px;color:var(--text2);margin-bottom:4px;display:flex;gap:7px}
.ev-popup-close{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;border:none;background:transparent;cursor:pointer;color:var(--text3);font-size:13px;font-family:inherit}
.items-list-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
.items-list-row:last-child{border-bottom:none}
.chat-shell{height:calc(100dvh - 132px);min-height:0;max-height:720px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);display:grid;grid-template-columns:minmax(0,1fr) 280px;overflow:hidden}
.chat-main{min-width:0;display:flex;flex-direction:column;overflow:hidden}
.chat-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(180deg,#fff,#fbfaf8)}
.chat-title{font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px}
.chat-meta{font-size:12px;color:var(--text3);font-weight:600}
.chat-list{flex:1;overflow-y:auto;padding:16px;background:#fbfaf7}
.chat-empty{text-align:center;color:var(--text3);font-size:13px;padding:46px 16px}
.chat-day{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--text3);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px}
.chat-day:before,.chat-day:after{content:"";height:1px;background:var(--border);flex:1}
.chat-msg{display:flex;gap:9px;margin-bottom:10px;align-items:flex-start}
.chat-msg.me{flex-direction:row-reverse}

.chat-react{display:inline-flex;align-items:center;justify-content:center;gap:3px;min-width:24px;height:21px;padding:0 5px;border:1px solid #efc5c0;border-radius:11px;background:#fff;color:var(--red);font-size:10px;font-weight:700;cursor:pointer;font-family:inherit}

.chat-read{margin-left:auto;font-size:10px;color:var(--text3);font-weight:700;white-space:nowrap}
.chat-del{border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:12px;padding:2px}
.chat-del:hover{color:var(--red)}
.chat-form{border-left:1px solid var(--border);padding:14px;background:#fff;display:flex;flex-direction:column;gap:9px}
.chat-form-title{font-size:14px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:7px;margin-bottom:2px}
.chat-form-sub{font-size:12px;color:var(--text3);line-height:1.45;margin-bottom:4px}
.chat-form textarea{min-height:118px;max-height:210px;resize:vertical}
.chat-compose-actions{display:flex;align-items:center;gap:7px}
.chat-attach{display:inline-flex;align-items:center;justify-content:center;gap:4px;min-width:58px;height:38px;padding:0 10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text2);cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;flex:0 0 auto}
.chat-attach:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.chat-send{flex:1;justify-content:center}
.chat-image-preview{position:relative;border:1px solid var(--border);border-radius:8px;padding:7px;background:var(--surface2)}
.chat-image-preview img{display:block;width:100%;height:86px;object-fit:cover;border-radius:5px}
.chat-image-remove{position:absolute;top:11px;right:11px;width:26px;height:26px;border:none;border-radius:50%;background:rgba(20,20,20,.72);color:#fff;cursor:pointer}
.chat-upload-note{font-size:11px;color:var(--text3);line-height:1.4}
.chat-tab-dot{display:inline-flex;width:7px;height:7px;border-radius:50%;background:var(--red);margin-left:2px;box-shadow:0 0 0 3px rgba(192,57,43,.12)}
.chat-lightbox{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.86);align-items:center;justify-content:center;padding:24px}
.chat-lightbox.open{display:flex}
.chat-lightbox img{max-width:96vw;max-height:92vh;object-fit:contain;border-radius:6px}
.chat-lightbox button{position:absolute;top:18px;right:18px;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.16);color:#fff;font-size:22px;cursor:pointer}
.sub-form{display:none;background:var(--surface2);border-radius:8px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.sub-form-title{font-size:13px;font-weight:700;margin-bottom:10px}
.tag-done{font-size:11px;padding:2px 8px;border-radius:10px;cursor:pointer;font-weight:700;background:#d1fae5;color:#065f46}
.tag-pending{font-size:11px;padding:2px 8px;border-radius:10px;cursor:pointer;font-weight:700;background:#fef3c7;color:#92400e}
.small-btn{padding:3px 9px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600}
.small-btn-edit{border:1px solid var(--border);background:transparent;color:var(--text2)}
.small-btn-del{border:1px solid #fca5a5;background:var(--red-light);color:var(--red)}
.subbtn{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:1px solid var(--accent);background:var(--accent-light);color:var(--accent)}

/* Modern refresh */
:root{--bg:#f5f7f6;--surface:#ffffff;--surface2:#f2f5f3;--border:#dde5df;--border2:#c8d4cc;--text:#17211b;--text2:#5f6b63;--text3:#9aa59d;--accent:#256f4b;--accent-light:#e6f3ec;--red:#c24135;--red-light:#fff1ef;--blue:#28619b;--blue-light:#eef5ff;--radius:8px;--shadow:0 1px 2px rgba(16,24,20,.05),0 8px 24px rgba(16,24,20,.06);--shadow-md:0 12px 34px rgba(16,24,20,.12)}
body{background:linear-gradient(180deg,#f7faf8 0,#f2f5f3 360px,#f5f7f6 100%);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.app-header{height:64px;padding:0 22px;background:rgba(255,255,255,.88);border-bottom:1px solid rgba(221,229,223,.85);backdrop-filter:blur(14px);box-shadow:0 1px 0 rgba(255,255,255,.8)}
.logo-icon{background:#1f5f41;color:#fff;box-shadow:inset 0 -1px 0 rgba(0,0,0,.12),0 6px 14px rgba(37,111,75,.18)}

.logo-sub{color:#7b877f}
.sync-badge{background:#f8faf9;border-color:#dce6df;color:#718078;box-shadow:inset 0 1px 0 rgba(255,255,255,.85)}

.auth-btn:hover{border-color:#bad1c2;color:var(--accent);background:#f7fbf8}
.auth-btn.signed-in{background:var(--accent);border-color:var(--accent);color:#fff}
.tabs-nav{padding:4px;background:#eef3f0;border:1px solid #dfe8e2;border-radius:10px;gap:2px}
.tab-btn{border-radius:7px;padding:8px 14px;color:#5b6961;min-height:34px}

.main{padding:24px 20px}
.stat-card,.site-card,.modal,.info-item,.timing-block,.sub-form{border-color:#dde6e0;box-shadow:var(--shadow)}
.stat-card{padding:16px 18px;background:linear-gradient(180deg,#fff 0,#fbfcfb 100%)}
.stat-label{color:#7a877f;letter-spacing:.35px}
.stat-val{color:#132019;letter-spacing:-.8px}
.site-grid{gap:14px}
.site-card{border-radius:8px;background:#fff;transition:border-color .16s,box-shadow .16s,transform .16s}
.site-card:hover{border-color:#b9c8bf;box-shadow:var(--shadow-md);transform:translateY(-2px)}
.site-name{color:#111c15;letter-spacing:0}
.site-meta,.muted{color:#818d85}
.site-company{border:1px solid #cfe5d7;background:#eef8f2;color:#256f4b}
.progress-bar{height:5px;background:#e6ece8}
.badge,.s-완료,.s-진행중,.s-예정,.tag-done,.tag-pending{border-radius:999px}
.filter-btn,.add-btn,.close-btn,.btn-secondary,.memo-save,.small-btn,.subbtn{border-color:#d9e3dd;background:#fff;box-shadow:0 1px 1px rgba(16,24,20,.03)}
.filter-btn:hover,.add-btn:hover,.btn-secondary:hover,.memo-save:hover{background:#f7fbf8;border-color:#bad1c2}
.filter-btn.on,.btn-primary{background:#256f4b;color:#fff;box-shadow:0 6px 16px rgba(37,111,75,.18)}
.btn-primary:hover{background:#1f5f41}
.task-table th,.pay-table th{background:#f3f6f4;color:#718078;letter-spacing:.25px}
.task-table tr:hover td,.pay-table tr.clickable:hover td{background:#f8faf9}
.tl-track{background:#eef3f0;border-color:#dce6df}
.tl-bar{border-radius:7px;border-color:rgba(16,24,20,.08);box-shadow:0 1px 2px rgba(16,24,20,.06)}
.cal-header,.filter-row{align-items:center}
.cal-cell{background:#fff;border-color:#e0e7e2;transition:background .12s,border-color .12s}
.cal-cell:hover{background:#f8faf9;border-color:#c6d5cc}
.cal-cell.today-cell{background:#f0f9f4;border-color:#62b884}
.cal-date-today{background:#256f4b}
.cal-ev{border-radius:5px}
.modal-bg{background:rgba(17,24,20,.34);backdrop-filter:blur(5px)}

.modal-title{letter-spacing:-.1px;color:#111c15}
.modal-body{padding:18px}
.info-item{background:#f7faf8}
.info-label{color:#7a877f;letter-spacing:.35px}
.sec-title{color:#162119;letter-spacing:.15px}
.timing-header{background:#f5f8f6}
.form-input,.memo-area{border-color:#d9e3dd;background:#fff;transition:border-color .15s,box-shadow .15s}
.form-input:focus,.memo-area:focus{border-color:#7dbc94;box-shadow:0 0 0 3px rgba(37,111,75,.12)}

.toast{border-radius:999px;background:#17211b;box-shadow:0 12px 30px rgba(16,24,20,.22)}
@media(max-width:680px){
  body{background:#f5f7f6}
  .app-header{padding:10px 12px 8px;background:rgba(255,255,255,.94)}

  .modal-header{padding:13px 14px 10px}
}

function hasFirebaseConfig(){
  return !!(FIREBASE_CONFIG&&FIREBASE_CONFIG.apiKey&&FIREBASE_CONFIG.projectId&&FIREBASE_CONFIG.appId);
}
function initFirebaseClient(){
  if(FIREBASE_READY)return FIREBASE_READY;
  FIREBASE_READY=new Promise(function(resolve){
    try{
      if(!hasFirebaseConfig()||!window.firebase){resolve(false);return;}
      if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);
      FIREBASE_AUTH=firebase.auth();
      FIREBASE_DB=firebase.firestore();
      if(FIREBASE_DB.enablePersistence){FIREBASE_DB.enablePersistence({synchronizeTabs:true}).catch(function(){});}
      resolve(true);
    }catch(e){console.warn('Firebase init failed',e);resolve(false);}
  });
  return FIREBASE_READY;
}
function setPageUnlocked(ok){
  document.body.classList.toggle('unlocked',!!ok);
  document.body.classList.toggle('locked',!ok);

}
function updateAuthUI(){
  setPageUnlocked(hasCodeAccess());

    b.textContent='입장 완료';

function sha256Hex(text){
  var enc=new TextEncoder().encode(text);
  return crypto.subtle.digest('SHA-256',enc).then(function(buf){
    return Array.prototype.map.call(new Uint8Array(buf),function(b){return b.toString(16).padStart(2,'0');}).join('');
  });
}
function hasCodeAccess(){return sessionStorage.getItem('smg_code_ok')==='1';}
function unlockWithCode(code){
  if(!ACCESS_CODE_HASH){showToast('입장 코드가 설정되지 않았어요');return Promise.resolve(false);}
  if(code===undefined||code===null){code=prompt('입장 코드를 입력해주세요');}
  if(!code)return Promise.resolve(false);
  return sha256Hex(String(code)).then(function(h){
    if(h!==ACCESS_CODE_HASH){showToast('입장 코드가 맞지 않아요');return false;}
    sessionStorage.setItem('smg_code_ok','1');
    setPageUnlocked(true);
    return true;
  });
}
function enterAccessCode(){
  var input=document.getElementById('access-code-input');
  var err=document.getElementById('access-error');
  var code=input?input.value:'';
  if(err)err.textContent='';
  unlockWithCode(code).then(function(ok){
    if(!ok){if(err)err.textContent='입장 코드가 맞지 않아요';if(input)input.select();return;}
    if(!appStarted)initData();
    waitForAuth().then(function(user){if(user){showToast('입장했어요');manualSync();}});
  });
}
function waitForAuth(){
  return initFirebaseClient().then(function(ok){
    if(!ok)return null;
    if(!hasCodeAccess()){currentUser=null;updateAuthUI();return null;}
    if(FIREBASE_AUTH_READY)return FIREBASE_AUTH_READY;
    FIREBASE_AUTH_READY=new Promise(function(resolve){
      FIREBASE_AUTH.onAuthStateChanged(function(user){
        if(user){currentUser=user;updateAuthUI();resolve(user);return;}
        FIREBASE_AUTH.signInAnonymously().then(function(cred){
          currentUser=cred.user;
          updateAuthUI();
          resolve(currentUser);
        }).catch(function(){currentUser=null;updateAuthUI();resolve(null);});
      });
    });
    return FIREBASE_AUTH_READY;
  });
}
function requireAuth(){return waitForAuth().then(function(){return !!currentUser;});}
function toggleAuth(){
  initFirebaseClient().then(function(ok){
    if(!ok){showToast('Firebase 설정값을 먼저 입력해주세요');return;}
    if(currentUser){
      sessionStorage.removeItem('smg_code_ok');
      FIREBASE_AUTH_READY=null;
      appStarted=false;
      FIREBASE_AUTH.signOut().then(function(){currentUser=null;updateAuthUI();setSyncStatus('err','잠김 · 로컬 모드');});
      return;
    }
    unlockWithCode().then(function(pass){
      if(pass){FIREBASE_AUTH_READY=null;waitForAuth().then(function(user){if(user){showToast('입장했어요');manualSync();}});}
    });
  });
}
function remoteDoc(key){return FIREBASE_DB.collection(FIREBASE_COLLECTION).doc(FIREBASE_DOC).collection('datasets').doc(key);}
function remoteRead(key){
  return requireAuth().then(function(ok){
    if(!ok)return null;
    return remoteDoc(key).get().then(function(snap){
      if(!snap.exists)return null;
      var d=snap.data()||{};
      return d.data!==undefined&&d.data!==null?d.data:null;
    });
  });
}
function remoteWrite(key,data){
  return requireAuth().then(function(ok){
    if(!ok)return false;
    return remoteDoc(key).set({data:data,updatedAt:new Date().toISOString(),updatedBy:currentUser?currentUser.uid:''},{merge:true}).then(function(){return true;});
  });
}
function sheetExtract(fileName,mediaType,base64,isDesign){
  if(!LEGACY_EXTRACT_API)return Promise.reject(new Error('extract server not configured'));
  return fetch(LEGACY_EXTRACT_API+'?action=extract',{
    method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({fileName:fileName,mediaType:mediaType,data:base64,type:isDesign?'design':'construction'})
  }).then(function(r){return r.json().catch(function(){return {};}).then(function(j){if(!r.ok)throw new Error(j.error||('extract failed: '+r.status));return j;});})
  .then(function(j){if(!j||j.ok===false||!j.data)throw new Error((j&&j.error)||'extract failed');return j.data;});
}
var PDFJS_PROMISE=null;
function loadPdfJs(){
  if(PDFJS_PROMISE)return PDFJS_PROMISE;
  PDFJS_PROMISE=import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.mjs').then(function(pdfjs){
    pdfjs.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.mjs';
    return pdfjs;
  });
  return PDFJS_PROMISE;
}
function fileToBase64Payload(file){
  return new Promise(function(resolve,reject){
    var reader=new FileReader();
    reader.onload=function(){
      var result=String(reader.result||'');
      resolve({fileName:file.name||'',mediaType:file.type||'application/octet-stream',base64:result.split(',')[1]||''});
    };
    reader.onerror=function(){reject(reader.error||new Error('파일을 읽지 못했어요'));};
    reader.readAsDataURL(file);
  });
}
function pdfFirstPageToImagePayload(file){
  return file.arrayBuffer().then(function(buffer){
    return loadPdfJs().then(function(pdfjs){
      return pdfjs.getDocument({data:new Uint8Array(buffer)}).promise;
    }).then(function(pdf){
      return pdf.getPage(1);
    }).then(function(page){
      var viewport=page.getViewport({scale:2.4});
      var canvas=document.createElement('canvas');
      var ctx=canvas.getContext('2d',{alpha:false});
      canvas.width=Math.ceil(viewport.width);
      canvas.height=Math.ceil(viewport.height);
      ctx.fillStyle='#fff';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      return page.render({canvasContext:ctx,viewport:viewport}).promise.then(function(){
        var dataUrl=canvas.toDataURL('image/jpeg',0.88);
        return {
          fileName:String(file.name||'document.pdf').replace(/\.pdf$/i,'.jpg'),
          mediaType:'image/jpeg',
          base64:dataUrl.split(',')[1]||''
        };
      });
    });
  });
}

// ── API ────────────────────────────────────────────────
function getLocalData(key,fallback){
  try{
    var raw=localStorage.getItem('smg_'+key);
    return raw?JSON.parse(raw):fallback;
  }catch(e){return fallback;}
}
function hasLocalData(key){return localStorage.getItem('smg_'+key)!==null;}
function defaultForKey(key){
  if(key==='sites')return DEFAULT_SITES;
  if(key==='reports')return DEFAULT_REPORTS;
  if(key==='plans')return DEFAULT_PLANS;
  if(key==='events')return DEFAULT_EVENTS;
  if(key==='chat')return [];
  if(key==='checks')return {};
  return [];
}
function setLocalData(key,data){
  // 마지막 정상값 백업: 원격 동기화 실패/덮어쓰기 사고 때 복구용
  var prev=localStorage.getItem('smg_'+key);
  if(prev)localStorage.setItem('smg_backup_'+key,prev);
  localStorage.setItem('smg_'+key,JSON.stringify(data));
}
function isRecentlySaved(key){
  var t=parseInt(localStorage.getItem('smg_lastSave_'+key)||'0');
  return (Date.now()-t)<120000; // 2분 이내 내 저장값은 원격값으로 덮지 않음
}
function isDeletedItem(item){return !!(item&&item.deletedAt);}
function activeList(arr){return (Array.isArray(arr)?arr:[]).filter(function(item){return !isDeletedItem(item);});}
function tombstoneItem(item){
  var nowIso=new Date().toISOString();
  return Object.assign({},item||{},{id:(item&&item.id)||uid(),deletedAt:nowIso,updatedAt:nowIso});
}
function mergeById(localArr,remoteArr){
  if(!Array.isArray(remoteArr))return localArr;
  if(!Array.isArray(localArr))localArr=[];
  var map={};
  remoteArr.forEach(function(item){
    if(item&&item.id)map[item.id]=item;
  });
  localArr.forEach(function(item){
    if(!item||!item.id)return;
    var remote=map[item.id];
    if(!remote){
      // 팀 시트가 예전 값이라 내 로컬 신규/삭제 항목이 빠진 경우 보존
      map[item.id]=item;
    }else{
      var lt=Date.parse(item.updatedAt||item.deletedAt||item.createdAt||0)||0;
      var rt=Date.parse(remote.updatedAt||remote.deletedAt||remote.createdAt||0)||0;
      if(lt>rt)map[item.id]=item;
    }
  });
  return Object.keys(map).map(function(k){return map[k];});
}
function applyRemote(key,remote){
  if(remote===null || remote===undefined)return false;
  if(isRecentlySaved(key))return false;

  // 업무계획/보고/이벤트는 원격값으로 통째 교체하지 않고 id 기준 병합
  // 시트가 순간적으로 오래된 값을 돌려줘도 방금 입력한 항목이 사라지지 않게 함
  if(key==='reports')remote=mergeById(reports,remote);
  if(key==='plans')remote=mergeById(plans,remote);
  if(key==='events')remote=mergeById(events,remote);
  if(key==='chat')remote=mergeById(chatMessages,remote);

  setLocalData(key,remote);
  if(key==='sites')sites=remote;
  if(key==='reports')reports=remote;
  if(key==='plans')plans=remote;
  if(key==='events')events=remote;
  if(key==='chat')chatMessages=remote;
  if(key==='checks')checkState=remote;
  return true;
}

function initData(){
  if(!hasCodeAccess()){
    appStarted=false;
    setPageUnlocked(false);
    setTimeout(function(){var el=document.getElementById('access-code-input');if(el)el.focus();},50);
    return;
  }
  appStarted=true;
  setPageUnlocked(true);
  sites=getLocalData('sites',DEFAULT_SITES);
  reports=getLocalData('reports',DEFAULT_REPORTS);
  plans=getLocalData('plans',DEFAULT_PLANS);
  events=getLocalData('events',DEFAULT_EVENTS);
  chatMessages=getLocalData('chat',[]);
  checkState=getLocalData('checks',{});
  renderAll();
  updateChatNotice();

  if(!hasFirebaseConfig()){
    setSyncStatus('err','Firebase 설정 필요 · 로컬 모드');
    updateAuthUI();
    return;
  }
  setSyncStatus('syncing','로그인 확인 중...');
  var keys=['sites','reports','plans','events','chat','checks'];
  var timer=new Promise(function(_,rej){setTimeout(function(){rej(new Error('timeout'));},12000);});
  Promise.race([waitForAuth().then(function(user){
    if(!user){setSyncStatus('err','입장 코드 필요 · 로컬 모드');return keys.map(function(){return null;});}
    setSyncStatus('syncing','Firebase 동기화 중...');
    return Promise.all(keys.map(function(k){return remoteRead(k);}));
  }),timer])
  .then(function(res){
    var migrations=res.map(function(remote,i){
      var key=keys[i];
      if((remote===null||remote===undefined)&&hasLocalData(key)){
        var local=getLocalData(key,defaultForKey(key));
        return remoteWrite(key,local).then(function(){return local;});
      }
      return Promise.resolve(remote);
    });
    return Promise.all(migrations);
  }).then(function(res){
    applyRemote('sites',res[0]);
    applyRemote('reports',res[1]);
    applyRemote('plans',res[2]);
    applyRemote('events',res[3]);
    applyRemote('chat',res[4]);
    applyRemote('checks',res[5]);
    setSyncStatus('ok','Firebase 동기화됨 ✓');
    renderAll();
    updateChatNotice();
    startChatListener();
  }).catch(function(err){console.warn(err);setSyncStatus('err','로컬 모드 · Firebase 연결 실패');});
}

var saveQueues={};
function save(key,data){
  var snapshot=JSON.parse(JSON.stringify(data)); // 저장 중 원본 배열이 바뀌어도 안전하게 고정
  setLocalData(key,snapshot);
  localStorage.setItem('smg_lastSave_'+key,Date.now().toString());
  if(!hasFirebaseConfig()){
    setSyncStatus('err','로컬 저장됨 · Firebase 설정 필요');
    return Promise.resolve(false);
  }
  if(!currentUser){
    setSyncStatus('err','로컬 저장됨 · 입장 코드 필요');
    return Promise.resolve(false);
  }
  setSyncStatus('syncing','Firebase 저장 중...');
  saveQueues[key]=(saveQueues[key]||Promise.resolve()).then(function(){return remoteWrite(key,snapshot);})
  .then(function(ok){
    setSyncStatus(ok?'ok':'err',ok?'Firebase 저장됨 ✓':'로컬 저장됨 · Firebase 설정 필요');
    return ok;
  }).catch(function(){setSyncStatus('err','로컬 저장됨 · Firebase 연결 실패');return false;});
  return saveQueues[key];
}

// 자동새로고침 비활성화 - 수동 동기화만 사용
function manualSync(){
  if(!hasFirebaseConfig()){
    setSyncStatus('err','Firebase 설정 필요 · 로컬 모드');
    showToast('Firebase 설정값을 먼저 입력해주세요');
    return;
  }
  if(!currentUser){
    toggleAuth();
    return;
  }
  setSyncStatus('syncing','Firebase 동기화 중...');
  var keys=['sites','reports','plans','events','chat','checks'];
  var timer=new Promise(function(_,rej){setTimeout(function(){rej(new Error('t'));},12000);});
  Promise.race([Promise.all(keys.map(function(k){return remoteRead(k);})),timer])
  .then(function(res){
    var kept=[];
    keys.forEach(function(key,i){if(!applyRemote(key,res[i])&&isRecentlySaved(key))kept.push(key);});
    setSyncStatus('ok',kept.length?'Firebase 동기화됨 ✓ (내 최근 변경 보존)':'Firebase 동기화됨 ✓');
    renderAll();
    showToast(kept.length?'Firebase 동기화 완료 — 내 최근 변경은 보존했어요':'Firebase 동기화 완료!');
  }).catch(function(){setSyncStatus('err','Firebase 동기화 실패');showToast('동기화 실패 — 로컬 데이터는 유지돼요');});
}

// ── Helpers ────────────────────────────────────────────
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function stageBadge(s){var m={'인테리어':'b-인테리어','착공':'b-착공','골조':'b-골조','인허가':'b-인허가','설계':'b-설계'};return '<span class="badge '+(m[s]||'b-설계')+'">'+s+'</span>';}
function avHtml(p,sz){sz=sz||18;var k=p==='이선주'?'선':p?p[0]:'?';var cls=p==='이선주'?'av-선':(p&&p.indexOf('정')>=0?'av-정':'av-이');return '<span class="av '+cls+'" style="width:'+sz+'px;height:'+sz+'px;font-size:'+(sz*.45)+'px;margin-right:4px">'+k+'</span>'+p;}
function avCls(p){return p==='이선주'?'av-선':(p&&p.indexOf('정')>=0?'av-정':'av-이');}
function avKey(p){return p==='이선주'?'선':p?p[0]:'';}
function statusBadge(s){var m={'완료':'s-완료','진행 중':'s-진행중','예정':'s-예정'};return s&&m[s]?'<span class="'+m[s]+'">'+s+'</span>':'';}
function fmtM(n){if(!n)return '—';return (n/10000).toLocaleString()+'만원';}
function fmtFull(n){if(!n)return '—';return n.toLocaleString()+'원';}
function moneyValue(v){return parseInt(String(v||'').replace(/[^\d-]/g,''),10)||0;}
function moneyText(v){var n=moneyValue(v);return n?n.toLocaleString():'';}
function moneyInput(el){el.value=moneyText(el.value);}
function shortSite(s){if(!s)return '—';return s.replace('경상북도 ','').replace('서울시 ','').replace('대구시 ','').replace('부산시 ','').replace('경산시 ','').replace(' 개령면','').replace(' 동래구','').replace(' 성동구','').replace(' 수성구','').replace(' 북구','').replace(' 동구','');}
function progColor(stage){return {'인테리어':'fill-green','착공':'fill-green','골조':'fill-blue','인허가':'fill-amber'}[stage]||'fill-purple';}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function calcProgress(s){
  var base={'설계':8,'인허가':22,'착공':38,'골조':55,'인테리어':75,'완공':100};
  var v=base[s.stage]||5;
  var livePayments=activeList(s.payment);
  if(livePayments.length){
    var r=livePayments.filter(function(p){return p.done;}).length/livePayments.length;
    var cur=base[s.stage]||5;
    var nextStage=STAGE_ORDER[STAGE_ORDER.indexOf(s.stage)+1];
    var nxt=nextStage?base[nextStage]||100:100;
    v=Math.round(cur+(nxt-cur)*r*0.6);
  }
  var liveDesignItems=s.designFee?activeList(s.designFee.items):[];
  if(liveDesignItems.length&&liveDesignItems.every(function(i){return i.done;})){v=Math.min(v+5,99);}
  return Math.min(v,99);
}

// ── 헤더 저장/삭제 버튼 ───────────────────────────────
function saveSiteFromModal(){
  var id=window._modalSiteId;
  if(!id)return;
  var s=sites.find(function(x){return x.id===id;});
  if(!s)return;
  var ta=document.getElementById('memo_'+id);
  if(ta)s.memo=ta.value;
  save('sites',sites);
  showToast('저장됐어요 ✓');
  var el=document.getElementById('memo-saved-'+id);
  if(el){el.style.opacity=1;setTimeout(function(){el.style.opacity=0;},2000);}
}

function deleteSiteFromModal(){
  // DOM과 window 변수 둘 다 확인
  var id = document.getElementById('modal').getAttribute('data-site-id') || window._modalSiteId;
  if(!id){showToast('오류: 현장 ID를 찾을 수 없어요');return;}
  var s=sites.find(function(x){return x.id===id;});
  if(!s){showToast('오류: 현장을 찾을 수 없어요');return;}
  if(!confirm((s.short||s.name)+' 현장을 삭제할까요?'))return;
  sites=sites.filter(function(x){return x.id!==id;});
  save('sites',sites);
  closeModal();
  renderAll();
  showToast('현장이 삭제됐어요');
}

function saveSiteEdit(id){
  var s=sites.find(function(x){return x.id===id;});
  if(!s)return;
  s.short=document.getElementById('si-short').value.trim()||s.name;
  s.stage=document.getElementById('si-stage').value;
  s.person=document.getElementById('si-person').value;
  s.py=parseInt(document.getElementById('si-py').value)||0;
  s.partner=document.getElementById('si-partner').value;
  s.company=document.getElementById('si-company').value;
  s.siteManager=document.getElementById('si-siteManager').value;
  var sv=document.getElementById('si-start').value;
  var ev=document.getElementById('si-end').value;
  s.start=sv?sv.replace(/-/g,'/'):'';
  s.end=ev?ev.replace(/-/g,'/'):'';
  save('sites',sites);
  closeForm();
  renderAll();
  openSiteModal(id);

function saveNewSite(){
  var name=document.getElementById('ns-name').value.trim();
  if(!name){showToast('현장 주소를 입력해주세요');return;}
  var sv=document.getElementById('ns-start').value;
  var ev=document.getElementById('ns-end').value;
  var ns={
    id:uid(),
    name:name,
    short:document.getElementById('ns-short').value.trim()||name,
    stage:document.getElementById('ns-stage').value,
    py:parseInt(document.getElementById('ns-py').value)||0,
    person:document.getElementById('ns-person').value,
    partner:document.getElementById('ns-partner').value||'—',
    company:document.getElementById('ns-company').value,
    siteManager:document.getElementById('ns-siteManager').value,
    start:sv?sv.replace(/-/g,'/'):'',
    end:ev?ev.replace(/-/g,'/'):'',
    memo:document.getElementById('ns-memo').value,
    payment:[],

  closeForm();
  renderAll();
  showToast("'"+ns.short+"' 현장이 추가됐어요 ✓");
}

// ── 파일 업로드 ────────────────────────────────────────
function setupDragDrop(areaId,inputId,statusId,dataId,isDesign){
  var area=document.getElementById(areaId); if(!area)return;
  area.addEventListener('dragover',function(e){e.preventDefault();area.classList.add('drag-over');});
  area.addEventListener('dragleave',function(){area.classList.remove('drag-over');});
  area.addEventListener('drop',function(e){
    e.preventDefault();area.classList.remove('drag-over');
    var f=e.dataTransfer.files[0];if(f)processFile(f,statusId,dataId,isDesign,null);
  });
}

function handleFile(input,statusId,dataId,isDesign){
  var f=input.files[0];if(!f)return;
  processFile(f,statusId,dataId,isDesign,null);
}

function handleFileAndApply(input,statusId,dataId,isDesign,applyFn){
  var f=input.files[0];if(!f)return;
  processFile(f,statusId,dataId,isDesign,function(){
    if(window[applyFn])window[applyFn]();
  });
}

function processFile(file,statusId,dataId,isDesign,callback){
  var statusEl=document.getElementById(statusId);
  if(statusEl)statusEl.innerHTML='<div class="upload-status loading"><i class="ti ti-loader"></i> 문서를 분석하고 있어요...</div>';
  var isPdf=(file.type&&file.type.indexOf('pdf')>=0)||/\.pdf$/i.test(file.name||'');
  var payloadPromise=isPdf
    ? (statusEl&&(statusEl.innerHTML='<div class="upload-status loading"><i class="ti ti-loader"></i> PDF를 이미지로 변환해서 분석하고 있어요...</div>'),pdfFirstPageToImagePayload(file).catch(function(){return fileToBase64Payload(file);}))
    : fileToBase64Payload(file);
  payloadPromise.then(function(payload){
    return sheetExtract(payload.fileName||file.name||'',payload.mediaType||file.type||'image/jpeg',payload.base64,isDesign);
  })
    .then(function(parsed){
      if(document.getElementById(dataId))document.getElementById(dataId).value=JSON.stringify(parsed);
      if(statusEl)statusEl.innerHTML='<div class="upload-status success"><i class="ti ti-check"></i> 인식 완료! 자동 적용됐어요</div>';
      if(callback)setTimeout(function(){callback();},100);
    }).catch(function(err){
      var msg=(err&&err.message)?err.message:'서버 인식 기능이 아직 준비되지 않았어요';
      if(statusEl)statusEl.innerHTML='<div class="upload-status error"><i class="ti ti-alert-circle"></i> '+esc(msg)+' — 직접 입력해주세요</div>';
    });
}

function renderCalendar(){

  function isToday(y,m,d){return y===today.getFullYear()&&m===today.getMonth()+1&&d===today.getDate();}

  [['#fef3c7','상량식'],['#d1fae5','미팅'],['#fce7f3','연차'],['#e5e7eb','기타']].forEach(function(x){h+='<div style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text3);font-weight:500"><div style="width:8px;height:8px;border-radius:50%;background:'+x[0]+';border:1px solid rgba(0,0,0,.1)"></div>'+x[1]+'</div>';});

  h+='</tr></thead><tbody>';

  for(var c=0;c<totalCells;c++){
    if(c%7===0)h+='<tr>';

function parseYMD(v){
  if(!v || v==='날짜 없음')return null;
  var d=new Date(String(v).replace(/\//g,'-'));
  return isNaN(d.getTime())?null:d;
}
function fmtYMD(d){return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');}
function weekInfo(dateStr){
  var d=parseYMD(dateStr);
  if(!d)return {key:'nodate',label:'날짜 없음',start:null,end:null,isCurrent:false};
  var start=new Date(d); start.setHours(0,0,0,0);
  var day=start.getDay();
  var diff=(day===0?-6:1-day); // 월요일 시작
  start.setDate(start.getDate()+diff);
  var end=new Date(start); end.setDate(start.getDate()+6);
  var now=new Date(); now.setHours(0,0,0,0);
  var isCur=now>=start&&now<=end;
  var key=start.getFullYear()+'-'+String(start.getMonth()+1).padStart(2,'0')+'-'+String(start.getDate()).padStart(2,'0');
  var label=fmtYMD(start)+' ~ '+fmtYMD(end)+(isCur?' · 이번 주':'');
  return {key:key,label:label,start:start,end:end,isCurrent:isCur};
}
function dayInfo(dateStr){
  var d=parseYMD(dateStr);
  if(!d)return {key:'nodate',label:'날짜 없음',date:null,isCurrent:false};
  d.setHours(0,0,0,0);
  var now=new Date(); now.setHours(0,0,0,0);
  var key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  var dayNames=['일','월','화','수','목','금','토'];
  var label=fmtYMD(d)+' ('+dayNames[d.getDay()]+')'+(d.getTime()===now.getTime()?' · 오늘':'');
  return {key:key,label:label,date:d,isCurrent:d.getTime()===now.getTime()};
}
function groupByDay(data){
  var g={};
  data.forEach(function(item){
    var d=dayInfo(item.date||'');
    if(!g[d.key])g[d.key]={info:d,rows:[]};
    g[d.key].rows.push(item);
  });
  var arr=Object.keys(g).map(function(k){return g[k];});
  arr.sort(function(a,b){
    if(a.info.key==='nodate')return 1;
    if(b.info.key==='nodate')return -1;
    return b.info.key.localeCompare(a.info.key);
  });
  arr.forEach(function(gr){
    gr.rows.sort(function(a,b){
      var au=Date.parse(a.updatedAt||a.createdAt||0)||0;
      var bu=Date.parse(b.updatedAt||b.createdAt||0)||0;
      return bu-au;
    });
  });
  return arr;
}
function groupByWeek(data,noDateFirst){
  var g={};
  data.forEach(function(item){
    var w=weekInfo(item.date||'');
    if(!g[w.key])g[w.key]={info:w,rows:[]};
    g[w.key].rows.push(item);
  });
  var arr=Object.keys(g).map(function(k){return g[k];});
  arr.sort(function(a,b){
    if(a.info.key==='nodate')return noDateFirst?-1:1;
    if(b.info.key==='nodate')return noDateFirst?1:-1;
    return b.info.key.localeCompare(a.info.key);
  });
  arr.forEach(function(gr){
    gr.rows.sort(function(a,b){return String(b.date||'').localeCompare(String(a.date||''));});
  });
  return arr;
}

function syncReportFromPlan(plan){
  if(!plan||!plan.id)return false;
  var nowIso=new Date().toISOString();
  var report=reports.find(function(r){return r.sourcePlanId===plan.id;});
  if(!report){
    report=reports.find(function(r){
      return r.fromPlan&&!r.sourcePlanId&&r.content===plan.content&&r.person===plan.person;
    });
  }
  if(report){
    report.content=plan.content;
    report.person=plan.person;
    report.status='완료';
    report.memo=plan.memo||'';
    report.site=plan.site||'';
    report.fromPlan=true;
    report.sourcePlanId=plan.id;
    report.updatedAt=nowIso;
    if(!report.date)report.date=todayYMD();
    return true;
  }
  reports.unshift({
    id:uid(),
    content:plan.content,
    date:todayYMD(),
    person:plan.person,
    status:'완료',
    memo:plan.memo||'',
    site:plan.site||'',
    fromPlan:true,
    sourcePlanId:plan.id,
    createdAt:nowIso,
    updatedAt:nowIso
  });
  return true;
}

  var cycle=['','예정','진행 중','완료'];
  var prev=plan.status||'';
  var next=cycle[(cycle.indexOf(prev)+1)%cycle.length];
  plan.status=next;
  plan.updatedAt=new Date().toISOString();
  if(next==='완료'&&prev!=='완료'){
    syncReportFromPlan(plan);
    Promise.all([save('reports',reports),save('plans',plans)]).then(function(){renderPlan();renderReport();showToast('완료 ✓ → 업무 보고에 자동 추가됐어요');});

  }

  window._formDeleteId = id;
  var fdb = document.getElementById('form-del-btn');
  if(fdb) fdb.style.display = id ? 'inline-block' : 'none';
  document.getElementById('form-bg').classList.add('open');
  setTimeout(function(){document.getElementById('fi-content').focus();},100);
}
function saveTaskForm(type,id){
  var isR=type==='report';var arr=isR?reports:plans;
  var content=document.getElementById('fi-content').value.trim();if(!content){showToast('업무내용을 입력해주세요');return;}
  var dr=document.getElementById('fi-date').value,ds=dr?dr.replace(/-/g,'/'):'';
  var newStatus=document.getElementById('fi-status').value;
  var prevStatus=id?(arr.find(function(x){return x.id===id;})||{}).status||'':'';
  var _dayNames=['일','월','화','수','목','금','토'];
  var _dayStr=(!isR&&ds)?_dayNames[new Date(ds.replace(/\//g,'-')).getDay()]||''  :'';
  var oldItem=id?(arr.find(function(x){return x.id===id;})||{}):{};
  var nowIso=new Date().toISOString();
  var ni={id:id||uid(),content:content,date:ds,day:_dayStr,person:document.getElementById('fi-person').value,status:newStatus,memo:document.getElementById('fi-memo').value,site:document.getElementById('fi-site').value,createdAt:oldItem.createdAt||nowIso,updatedAt:nowIso};
  if(id){var idx=arr.findIndex(function(x){return x.id===id;});if(idx>=0)arr[idx]=ni;}else arr.unshift(ni);
  if(!isR&&newStatus==='완료'&&prevStatus!=='완료'){
    syncReportFromPlan(ni);
  }
  if(isR){save('reports',reports).then(function(){renderReport();});}
  else if(newStatus==='완료'&&prevStatus!=='완료'){Promise.all([save('reports',reports),save('plans',plans)]).then(function(){renderPlan();renderReport();});}
  else{save('plans',plans).then(function(){renderPlan();});}
  closeForm();
  if(!isR&&newStatus==='완료'&&prevStatus!=='완료')showToast('완료됐어요 ✓ → 업무 보고에 자동 추가됐어요');
  else showToast('저장됐어요 ✓');
}
function formDeleteAction(){
  var type=window._formDeleteType, id=window._formDeleteId;
  if(!type||!id)return;
  if(!confirm('삭제할까요?'))return;
  if(type==='report'){var ri=reports.findIndex(function(r){return r.id===id;});if(ri>=0)reports[ri]=tombstoneItem(reports[ri]);save('reports',reports).then(function(){renderReport();});}
  else if(type==='event'){var ei=events.findIndex(function(e){return e.id===id;});if(ei>=0)events[ei]=tombstoneItem(events[ei]);save('events',events).then(function(){renderCalendar();});}
  else{var pi=plans.findIndex(function(p){return p.id===id;});if(pi>=0)plans[pi]=tombstoneItem(plans[pi]);save('plans',plans).then(function(){renderPlan();});}
  closeForm();showToast('삭제했어요');
}

window.deleteTask = function deleteTask(type,id){
  if(!confirm('삭제할까요?'))return;
  if(type==='report'){var ri=reports.findIndex(function(r){return r.id===id;});if(ri>=0)reports[ri]=tombstoneItem(reports[ri]);save('reports',reports).then(function(){renderReport();});}
  else{var pi=plans.findIndex(function(p){return p.id===id;});if(pi>=0)plans[pi]=tombstoneItem(plans[pi]);save('plans',plans).then(function(){renderPlan();});}
  showToast('삭제했어요');
}
function chatDayLabel(iso){
  var d=iso?new Date(iso):new Date();
  if(isNaN(d.getTime()))d=new Date();
  var today=new Date();
  var yday=new Date();yday.setDate(today.getDate()-1);
  var same=function(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();};
  if(same(d,today))return '오늘';
  if(same(d,yday))return '어제';
  return d.getFullYear()+'. '+String(d.getMonth()+1).padStart(2,'0')+'. '+String(d.getDate()).padStart(2,'0');
}
function chatTimeLabel(iso){
  var d=iso?new Date(iso):new Date();
  if(isNaN(d.getTime()))d=new Date();
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
function latestChatTime(){
  return activeList(chatMessages).reduce(function(max,m){
    var t=Date.parse(m.createdAt||0)||0;
    return Math.max(max,t);
  },0);
}
function updateChatNotice(){
  var latest=latestChatTime();
  var seen=parseInt(localStorage.getItem(CHAT_LAST_SEEN_KEY)||'0',10)||0;
  chatUnread=latest>seen;
  document.title=chatUnread?'● '+baseTitle:baseTitle;
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    if(btn.getAttribute('data-tab')!=='chat')return;
    var dot=btn.querySelector('.chat-tab-dot');
    if(chatUnread&&!dot){
      btn.insertAdjacentHTML('beforeend','<span class="chat-tab-dot" title="새 메시지"></span>');
    }else if(!chatUnread&&dot){
      dot.remove();
    }
  });
}
function markChatTabRead(){
  localStorage.setItem(CHAT_LAST_SEEN_KEY,String(Math.max(Date.now(),latestChatTime())));
  chatUnread=false;
  updateChatNotice();
}
function chatMessageDoc(id){return remoteDoc('chatmsg_'+id);}
function cacheChatMessages(){
  var light=chatMessages.map(function(message){
    if(!message||!message.imageData)return message;
    var copy=Object.assign({},message,{hasImage:true});delete copy.imageData;return copy;
  });
  setLocalData('chat',light);
}
function mergeOneChatMessage(message){
  if(!message||!message.id)return;
  chatMessages=mergeById(chatMessages,[message]);
  cacheChatMessages();
}
function writeChatMessage(message){
  mergeOneChatMessage(message);
  if(!currentUser)return Promise.resolve(false);
  return chatMessageDoc(message.id).set({
    type:'chatMessage',
    message:message,
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  },{merge:true}).then(function(){return true;}).catch(function(err){console.warn('chat save failed',err);return false;});
}
function mutateChatMessage(id,mutator){
  var local=chatMessages.find(function(m){return m.id===id;});
  if(!local)return Promise.resolve(null);
  var optimistic=mutator(JSON.parse(JSON.stringify(local)));
  optimistic.updatedAt=new Date().toISOString();
  mergeOneChatMessage(optimistic);
  if(!currentUser)return Promise.resolve(optimistic);
  var ref=chatMessageDoc(id);
  return FIREBASE_DB.runTransaction(function(tx){
    return tx.get(ref).then(function(snap){
      var remote=snap.exists?(snap.data()||{}).message:null;
      var base=remote&&remote.id?remote:local;
      var next=mutator(JSON.parse(JSON.stringify(base)));
      next.updatedAt=new Date().toISOString();
      tx.set(ref,{type:'chatMessage',message:next,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
      return next;
    });
  }).then(function(next){mergeOneChatMessage(next);return next;}).catch(function(err){console.warn('chat update failed',err);return optimistic;});
}
function chatReadLabel(message,person){
  if(message.person!==person)return '';
  var readers=(Array.isArray(message.readBy)?message.readBy:[]).filter(function(p){return p&&p!==message.person;});
  if(!readers.length)return '전송됨';
  return readers.length===1?'읽음 '+readers[0]:'읽음 '+readers.length+'명';
}
function markChatMessagesRead(person){
  var targets=activeList(chatMessages).filter(function(m){
    return m.person!==person&&!(Array.isArray(m.readBy)&&m.readBy.indexOf(person)>=0)&&!chatReadSaving[m.id];
  }).slice(-50);
  if(!targets.length)return;
  targets.forEach(function(m){
    chatReadSaving[m.id]=true;
    mutateChatMessage(m.id,function(base){
      var list=Array.isArray(base.readBy)?base.readBy.slice():[];
      if(list.indexOf(person)<0)list.push(person);
      base.readBy=list;
      return base;
    }).then(function(){delete chatReadSaving[m.id];});
  });
}
function renderChat(keepScroll){
  var root=document.getElementById('chat-root');
  if(!root)return;
  var oldList=document.getElementById('chat-list');
  var oldScroll=oldList?oldList.scrollTop:null;
  var rows=activeList(chatMessages).slice().sort(function(a,b){
    return (Date.parse(a.createdAt||0)||0)-(Date.parse(b.createdAt||0)||0);
  });
  var person=localStorage.getItem('smg_chat_person')||PERSONS[0];
  var h='<div class="chat-shell"><div class="chat-main">';
  h+='<div class="chat-head"><div class="chat-title"><i class="ti ti-message-circle"></i> 팀 채팅</div><div class="chat-meta">'+rows.length+'개 메시지</div></div>';
  h+='<div class="chat-list" id="chat-list">';
  if(!rows.length){
    h+='<div class="chat-empty">아직 메시지가 없어요. 첫 메시지를 남겨보세요.</div>';
  }else{
    var lastDay='';
    rows.forEach(function(m){
      var day=chatDayLabel(m.createdAt);
      if(day!==lastDay){h+='<div class="chat-day">'+day+'</div>';lastDay=day;}
      var mine=(m.person===person);
      var likedBy=Array.isArray(m.likedBy)?m.likedBy:[];
      var liked=likedBy.indexOf(person)>=0;
      h+='<div class="chat-msg '+(mine?'me':'')+'">';
      h+='<div class="chat-avatar '+avCls(m.person)+'">'+esc(avKey(m.person)||'?')+'</div>';
      h+='<div class="chat-bubble">';
      h+='<div class="chat-info"><span>'+esc(m.person||'작성자')+'</span><span>'+chatTimeLabel(m.createdAt)+'</span><button class="chat-del" title="삭제" onclick="deleteChatMessage(\''+m.id+'\')"><i class="ti ti-trash"></i></button></div>';
      if(m.text)h+='<div class="chat-text">'+esc(m.text)+'</div>';
      if(m.imageData)h+='<img class="chat-image" src="'+esc(m.imageData)+'" alt="'+esc(m.imageName||'첨부 이미지')+'" onclick="openChatImage(\''+m.id+'\')">';
      h+='<div class="chat-actions"><button class="chat-react '+(liked?'on':'')+'" onclick="toggleChatLike(\''+m.id+'\')" title="'+esc(likedBy.join(', ')||'좋아요')+'" aria-label="좋아요"><span class="chat-heart" aria-hidden="true">♥</span>'+(likedBy.length?'<span>'+likedBy.length+'</span>':'')+'</button>';
      h+='<span class="chat-read">'+esc(chatReadLabel(m,person))+'</span></div></div></div>';
    });
  }
  h+='</div></div>';
  h+='<div class="chat-form">';
  h+='<div class="chat-form-title"><i class="ti ti-edit"></i> 메시지 작성</div>';
  h+='<div class="chat-form-sub">업무 공유나 현장 메모를 남기면 다른 기기에서도 같이 확인됩니다.</div>';
  h+='<select class="form-input" id="chat-person" onchange="localStorage.setItem(\'smg_chat_person\',this.value);renderChat()">'+PERSONS.map(function(p){return '<option value="'+p+'" '+(person===p?'selected':'')+'>'+p+'</option>';}).join('')+'</select>';
  h+='<textarea class="form-input" id="chat-input" placeholder="메시지를 입력하세요" oninput="pendingChatDraft=this.value" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendChatMessage()}">'+esc(pendingChatDraft)+'</textarea>';
  h+='<div class="chat-image-preview" id="chat-image-preview" style="display:'+(pendingChatImage?'block':'none')+'">'+(pendingChatImage?'<img src="'+esc(pendingChatImage.dataUrl)+'" alt="첨부 미리보기"><button class="chat-image-remove" type="button" onclick="removeChatImage()" title="이미지 제거"><i class="ti ti-x"></i></button>':'')+'</div>';
  h+='<div class="chat-compose-actions"><input type="file" id="chat-image-input" accept="image/*" style="display:none" onchange="prepareChatImage(this)"><button class="chat-attach" type="button" onclick="document.getElementById(\'chat-image-input\').click()" title="이미지 첨부"><i class="ti ti-paperclip"></i> 사진</button><button class="btn-primary chat-send" id="chat-send-btn" onclick="sendChatMessage()"><i class="ti ti-send"></i> 보내기</button></div>';
  h+='<div class="chat-upload-note">사진은 전송 전에 자동으로 크기를 줄여 저장합니다.</div>';
  h+='</div></div>';
  root.innerHTML=h;
  setTimeout(function(){var list=document.getElementById('chat-list');if(list)list.scrollTop=keepScroll&&oldScroll!==null?oldScroll:list.scrollHeight;},0);
  markChatTabRead();
  markChatMessagesRead(person);
}
function prepareChatImage(input){
  var file=input&&input.files?input.files[0]:null;
  if(!file)return;
  if(!/^image\//.test(file.type)){showToast('이미지 파일만 첨부할 수 있어요');input.value='';return;}
  if(file.size>15*1024*1024){showToast('15MB 이하 이미지를 선택해주세요');input.value='';return;}
  showToast('이미지를 준비하고 있어요...');
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var maxSide=1280,scale=Math.min(1,maxSide/Math.max(img.width,img.height));
      var canvas=document.createElement('canvas');
      canvas.width=Math.max(1,Math.round(img.width*scale));canvas.height=Math.max(1,Math.round(img.height*scale));
      var ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0,canvas.width,canvas.height);
      var quality=.82,data=canvas.toDataURL('image/jpeg',quality);
      while(data.length>CHAT_IMAGE_MAX_CHARS&&quality>.42){quality-=.08;data=canvas.toDataURL('image/jpeg',quality);}
      if(data.length>CHAT_IMAGE_MAX_CHARS){showToast('이미지가 너무 커요. 더 작은 사진을 선택해주세요');input.value='';return;}
      pendingChatImage={dataUrl:data,name:(file.name||'사진').replace(/\.[^.]+$/,'')+'.jpg'};
      renderChat(true);showToast('이미지가 첨부됐어요');
    };
    img.onerror=function(){showToast('이미지를 읽지 못했어요');};
    img.src=reader.result;
  };
  reader.onerror=function(){showToast('이미지를 읽지 못했어요');};
  reader.readAsDataURL(file);
}
function removeChatImage(){pendingChatImage=null;renderChat(true);}
function openChatImage(id){
  var message=chatMessages.find(function(m){return m.id===id;});
  if(!message||!message.imageData)return;
  document.getElementById('chat-lightbox-img').src=message.imageData;
  document.getElementById('chat-lightbox').classList.add('open');
}
function closeChatImage(){
  document.getElementById('chat-lightbox').classList.remove('open');
  document.getElementById('chat-lightbox-img').removeAttribute('src');
}
function sendChatMessage(){
  var input=document.getElementById('chat-input');
  var personEl=document.getElementById('chat-person');
  var text=input?input.value.trim():'';
  if(!text&&!pendingChatImage){showToast('메시지나 이미지를 입력해주세요');return;}
  var person=personEl?personEl.value:(localStorage.getItem('smg_chat_person')||PERSONS[0]);
  localStorage.setItem('smg_chat_person',person);
  var nowIso=new Date().toISOString();
  var message={id:uid(),person:person,text:text,createdAt:nowIso,updatedAt:nowIso,readBy:[person],likedBy:[]};
  if(pendingChatImage){message.imageData=pendingChatImage.dataUrl;message.imageName=pendingChatImage.name;}
  var sendBtn=document.getElementById('chat-send-btn');if(sendBtn)sendBtn.disabled=true;
  if(input)input.value='';
  pendingChatImage=null;pendingChatDraft='';
  writeChatMessage(message).then(function(ok){renderChat();showToast(ok?'보냈어요':'기기에 저장했어요');});
}
function toggleChatLike(id){
  var person=localStorage.getItem('smg_chat_person')||PERSONS[0];
  mutateChatMessage(id,function(base){
    var list=Array.isArray(base.likedBy)?base.likedBy.slice():[];
    var idx=list.indexOf(person);if(idx>=0)list.splice(idx,1);else list.push(person);
    base.likedBy=list;return base;
  }).then(function(){renderChat(true);});
}
function deleteChatMessage(id){
  if(!confirm('메시지를 삭제할까요?'))return;
  mutateChatMessage(id,function(base){return tombstoneItem(base);}).then(function(){renderChat();showToast('삭제했어요');});
}
function startChatListener(){
  if(CHAT_UNSUB.length||!FIREBASE_DB||!currentUser)return;
  try{
    var query=FIREBASE_DB.collection(FIREBASE_COLLECTION).doc(FIREBASE_DOC).collection('datasets').where('type','==','chatMessage');
    CHAT_UNSUB.push(query.onSnapshot(function(snapshot){
      var remote=[];snapshot.forEach(function(doc){var data=doc.data()||{};if(data.message)remote.push(data.message);});
      if(!remote.length)return;
      var wasLatest=latestChatTime();
      chatMessages=mergeById(chatMessages,remote);cacheChatMessages();
      var chatOpen=document.getElementById('tab-chat').classList.contains('active');
      if(chatOpen)renderChat(true);
      else if(latestChatTime()>wasLatest){updateChatNotice();showToast('새 채팅이 도착했어요');}
    }));
    CHAT_LEGACY_UNSUB=remoteDoc('chat').onSnapshot(function(doc){
      var data=doc.exists?(doc.data()||{}).data:null;
      if(!Array.isArray(data)||!data.length)return;
      var wasLatest=latestChatTime();
      chatMessages=mergeById(chatMessages,data);cacheChatMessages();
      var chatOpen=document.getElementById('tab-chat').classList.contains('active');
      if(chatOpen)renderChat(true);
      else if(latestChatTime()>wasLatest){updateChatNotice();showToast('새 채팅이 도착했어요');}
    });
  }catch(e){console.warn('chat listener failed',e);}
}
function showTab(name,btn){
  document.body.classList.toggle('chat-mode',name==='chat');
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('tab-'+name).classList.add('active');btn.classList.add('active');
  if(name==='timeline')renderTimeline();
  else if(name==='calendar'){goToday();}
  else if(name==='report')renderReport();
  else if(name==='plan')renderPlan();
  else if(name==='chat')renderChat();
}
function closeBg(e){if(e.target===document.getElementById('modal-bg'))closeModal();}
function closeModal(){
  document.getElementById('modal-bg').classList.remove('open');
  document.getElementById('modal').setAttribute('data-site-id','');
  window._modalSiteId=null;
  var sb=document.getElementById('modal-save-btn');
  var db=document.getElementById('modal-del-btn');
  if(sb)sb.style.display='none';
  if(db)db.style.display='none';
}
function closeFormBg(e){if(e.target===document.getElementById('form-bg'))closeForm();}
function closeForm(){
  document.getElementById('form-bg').classList.remove('open');
  document.getElementById('form-modal').style.maxWidth='';
  var fdb=document.getElementById('form-del-btn');
  if(fdb)fdb.style.display='none';
  window._formDeleteType=null; window._formDeleteId=null;
}

initData();
</script>
